services:
  postgres:
    image: postgres:16-alpine
    container_name: todo_app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sean2366
      POSTGRES_DB: todo_app
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
